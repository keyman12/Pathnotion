<script>
// Swallow benign ResizeObserver browser warning
window.addEventListener('error', (e) => {
  if (e.message && e.message.includes('ResizeObserver loop')) {
    e.stopImmediatePropagation();
    e.preventDefault();
  }
}, true);
</script>
<style>
/* ========================================================================
   Path Design System — Colors & Type
   Source: Figma "DashBoard Design and Demo.fig" /Style-Guide and top metadata
   Brand: Path — Commerce for Platforms (banking acquiring / ISV portal)
   ======================================================================== */

@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=Inter:wght@400;500;600;700&family=Roboto:wght@400;500;700&display=swap');

:root {
  /* ----- Brand palette ----- */
  /* Primary greens (Path brand) */
  --path-primary:         #297D2D; /* 297D2D primary */
  --path-primary-light-1: #3B9F40;
  --path-primary-light-2: #49BC4E; /* used for sidebar active-accent bars */
  --path-primary-50:      #74D479; /* subtle accents */
  --path-primary-25:      #97DF9A; /* soft chips */
  --path-primary-tint:    #ECFDF3; /* positive success background */
  --path-primary-ink:     #037847; /* positive success text */

  /* Secondary red (alert / negative) */
  --path-secondary:          #FF5252;
  --path-secondary-light-1:  #FF8A80;
  --path-secondary-light-2:  #FFA49C;

  /* Accent data viz (used in dashboards & pricing) */
  --path-accent-blue:    #0068A3;
  --path-accent-navy:    #10298E;
  --path-accent-deep:    #002855;
  --path-accent-violet:  #2D2341;

  /* ----- Greyscale ----- */
  --grey-0:   #FFFFFF;
  --grey-25:  #F8F8F8; /* page canvas */
  --grey-50:  #F5F5F5;
  --grey-75:  #F3F3F3;
  --grey-100: #EAECF0; /* borders, dividers */
  --grey-150: #DADADA;
  --grey-200: #D8DBD8; /* soft dividers */
  --grey-300: #AFB3AF;
  --grey-400: #919593;
  --grey-500: #747973; /* secondary text */
  --grey-600: #565955;
  --grey-700: #454745; /* primary body text */
  --grey-800: #222222;
  --grey-900: #1E1E1E;
  --grey-1000:#1A1919;
  --ink:      #000000;

  /* Semantic (mapped to brand) */
  --fg-1:          var(--grey-900); /* headings */
  --fg-2:          var(--grey-700); /* body */
  --fg-3:          var(--grey-500); /* secondary / meta */
  --fg-4:          var(--grey-400); /* muted / placeholder */
  --fg-on-primary: var(--grey-0);
  --fg-link:       var(--path-accent-blue);

  --bg-canvas:     var(--grey-25);
  --bg-surface:    var(--grey-0);
  --bg-raised:     var(--grey-0);
  --bg-sunken:     var(--grey-50);
  --bg-hover:      var(--grey-75);
  --bg-active:     var(--grey-100);

  --border-subtle: var(--grey-100);
  --border-default:var(--grey-200);
  --border-strong: var(--grey-300);

  --success-bg:   var(--path-primary-tint);
  --success-fg:   var(--path-primary-ink);
  --success-dot:  var(--path-primary-light-1);
  --danger-bg:    #FEF3F2;
  --danger-fg:    #B42318;
  --danger-dot:   var(--path-secondary);
  --warning-bg:   #FFFAEB;
  --warning-fg:   #B54708;
  --info-bg:      #EFF8FF;
  --info-fg:      var(--path-accent-blue);

  /* Active-row accent bar (characteristic of Path sidebar) */
  --accent-bar:   var(--path-primary-light-2);

  /* ----- Type families ----- */
  --font-primary:   'Poppins', system-ui, -apple-system, 'Segoe UI', sans-serif;
  --font-secondary: 'Inter', system-ui, -apple-system, sans-serif;
  --font-numeric:   'Inter', 'Poppins', system-ui, sans-serif;
  --font-mono:      'Liberation Mono', ui-monospace, 'SF Mono', Menlo, monospace;

  /* ----- Type scale (from Style-Guide/Frame-1) ----- */
  --fs-h0: 72px;
  --fs-h1: 48px;
  --fs-h2: 32px;
  --fs-h3: 24px;
  --fs-h4: 18px;
  --fs-p1: 16px;
  --fs-p2: 14px;
  --fs-p3: 12px;
  --fs-p4: 10px;

  --lh-tight: 1.0;
  --lh-snug:  1.2;
  --lh-body:  1.5;

  --fw-regular:  400;
  --fw-medium:   500;
  --fw-semibold: 600;
  --fw-bold:     700;
  --fw-extra:    800;

  /* ----- Radii ----- */
  --radius-xs: 4px;
  --radius-sm: 6px;   /* sidebar, cards */
  --radius-md: 8px;   /* default card */
  --radius-lg: 10px;  /* sidebar active bar */
  --radius-xl: 12px;
  --radius-pill: 999px;

  /* ----- Elevation (restrained, fintech) ----- */
  --shadow-0: none;
  --shadow-1: 0 1px 2px rgba(16, 24, 40, 0.04), 0 1px 3px rgba(16, 24, 40, 0.05);
  --shadow-2: 0 2px 6px rgba(16, 24, 40, 0.06), 0 1px 2px rgba(16, 24, 40, 0.04);
  --shadow-3: 0 8px 24px rgba(16, 24, 40, 0.08);
  --shadow-focus: 0 0 0 3px rgba(73, 188, 78, 0.20);

  /* ----- Spacing (4px grid) ----- */
  --sp-1: 4px;
  --sp-2: 8px;
  --sp-3: 12px;
  --sp-4: 16px;
  --sp-5: 20px;
  --sp-6: 24px;
  --sp-7: 32px;
  --sp-8: 40px;
  --sp-9: 48px;
  --sp-10: 64px;

  /* ----- Layout ----- */
  --layout-sidebar-w: 190px;
  --layout-topbar-h:  66px;
  --layout-content-max: 1250px;
}

/* =====================================================================
   Dark theme — Path Dark Mode with pink accents
   ===================================================================== */
[data-theme="dark"] {
  /* Path dark palette */
  --path-primary:         #00E676;  /* accent green */
  --path-primary-light-1: #33EB91;
  --path-primary-light-2: #33EB91;
  --path-primary-50:      #00E676;
  --path-primary-25:      #00C853;
  --path-primary-tint:    #0D2A1A;  /* dark green tint bg */
  --path-primary-ink:     #6EF0A8;  /* light green text */

  /* Secondary → pink */
  --path-secondary:          #FF3B7F;
  --path-secondary-light-1:  #FF6AA0;
  --path-secondary-light-2:  #FF90B8;

  /* Dark surfaces */
  --fg-1:          #F3F3F3;
  --fg-2:          #D4D4D4;
  --fg-3:          #9A9A9A;
  --fg-4:          #6B6B6B;
  --fg-on-primary: #0A0A0A;
  --fg-link:       #00E676;

  --bg-canvas:     #121212;
  --bg-surface:    #1E1E1E;
  --bg-raised:     #242424;
  --bg-sunken:     #181818;
  --bg-hover:      #262626;
  --bg-active:     #2E2E2E;

  --border-subtle:  #2A2A2A;
  --border-default: #3A3A3A;
  --border-strong:  #4A4A4A;

  --success-bg:   #0D2A1A;
  --success-fg:   #6EF0A8;
  --success-dot:  #00E676;
  --danger-bg:    #2A1118;
  --danger-fg:    #FF90B8;
  --danger-dot:   #FF3B7F;
  --warning-bg:   #2B2211;
  --warning-fg:   #F2C14E;
  --info-bg:      #0F2536;
  --info-fg:      #6EC1F0;

  --accent-bar:   #00E676;

  --shadow-1: 0 1px 2px rgba(0,0,0,0.4), 0 1px 3px rgba(0,0,0,0.5);
  --shadow-2: 0 2px 8px rgba(0,0,0,0.5);
  --shadow-3: 0 10px 30px rgba(0,0,0,0.6);
  --shadow-focus: 0 0 0 3px rgba(0, 230, 118, 0.28);
}
/* Dark-specific tweaks for elements that hard-code colors */
[data-theme="dark"] .btn-primary { background: var(--path-primary); color: #0A0A0A; border-color: var(--path-primary); }
[data-theme="dark"] .btn-primary:hover { background: var(--path-primary-light-1); border-color: var(--path-primary-light-1); }
[data-theme="dark"] .tweak-seg button.on { background: var(--bg-raised); color: var(--fg-1); box-shadow: 0 1px 2px rgba(0,0,0,0.5); }
[data-theme="dark"] .prose blockquote { background: #1A1A1A; border-left-color: var(--path-primary); }
[data-theme="dark"] .prose .embed { background: #1A1A1A; }
[data-theme="dark"] kbd { background: #2A2A2A; color: var(--fg-2); border-color: var(--border-default); }
[data-theme="dark"] .tweaks-panel { background: var(--bg-surface); border-color: var(--border-default); box-shadow: 0 20px 60px rgba(0,0,0,0.7); }
[data-theme="dark"] .tweaks-head { border-bottom-color: var(--border-subtle); }
[data-theme="dark"] .tweak-seg { background: var(--bg-sunken); }
[data-theme="dark"] input, [data-theme="dark"] textarea {
  background: var(--bg-surface); color: var(--fg-1);
  caret-color: var(--path-primary);
}
[data-theme="dark"] input::placeholder, [data-theme="dark"] textarea::placeholder { color: var(--fg-4); }
[data-theme="dark"] .logo-light { display: none !important; }
[data-theme="dark"] .logo-dark { display: block !important; }
/* Avatar gradients — keep visible */
[data-theme="dark"] .av-dave { background: linear-gradient(135deg, #00E676, #00A850); color: #0A0A0A; }
[data-theme="dark"] .av-raj  { background: linear-gradient(135deg, #FF3B7F, #AA2050); }
[data-theme="dark"] .av-agent { background: #0A0A0A; border: 1px solid #333; }


/* =====================================================================
   Semantic typographic rules
   Matches Style-Guide Frame-1 hierarchy (Poppins primary, Inter secondary)
   ===================================================================== */
html, body {
  font-family: var(--font-primary);
  color: var(--fg-2);
  font-size: var(--fs-p1);
  line-height: var(--lh-body);
  background: var(--bg-canvas);
  -webkit-font-smoothing: antialiased;
}

.h0, h1.display { font-family: var(--font-primary); font-size: var(--fs-h0); font-weight: var(--fw-bold); line-height: var(--lh-tight); color: var(--fg-1); letter-spacing: -0.02em; }
h1, .h1 { font-family: var(--font-primary); font-size: var(--fs-h1); font-weight: var(--fw-bold); line-height: var(--lh-snug); color: var(--fg-1); letter-spacing: -0.015em; }
h2, .h2 { font-family: var(--font-primary); font-size: var(--fs-h2); font-weight: var(--fw-semibold); line-height: var(--lh-snug); color: var(--fg-1); letter-spacing: -0.01em; }
h3, .h3 { font-family: var(--font-primary); font-size: var(--fs-h3); font-weight: var(--fw-semibold); line-height: var(--lh-snug); color: var(--fg-1); }
h4, .h4 { font-family: var(--font-primary); font-size: var(--fs-h4); font-weight: var(--fw-medium);   line-height: var(--lh-snug); color: var(--fg-1); }

p, .p1  { font-family: var(--font-primary); font-size: var(--fs-p1); font-weight: var(--fw-regular); line-height: var(--lh-body); color: var(--fg-2); }
.p2     { font-family: var(--font-primary); font-size: var(--fs-p2); font-weight: var(--fw-regular); line-height: var(--lh-body); color: var(--fg-2); }
.caption{ font-family: var(--font-primary); font-size: var(--fs-p3); font-weight: var(--fw-regular); line-height: var(--lh-body); color: var(--fg-3); }
.micro  { font-family: var(--font-primary); font-size: var(--fs-p4); font-weight: var(--fw-medium);  line-height: var(--lh-tight); color: var(--fg-3); letter-spacing: 0.02em; }

.num    { font-family: var(--font-numeric); font-variant-numeric: tabular-nums; font-feature-settings: "tnum"; }
.mono   { font-family: var(--font-mono); }

/* Utility */
.fg-1 { color: var(--fg-1); }
.fg-2 { color: var(--fg-2); }
.fg-3 { color: var(--fg-3); }
.fg-4 { color: var(--fg-4); }
.fg-brand { color: var(--path-primary); }
.fg-success { color: var(--success-fg); }
.fg-danger  { color: var(--danger-fg); }

</style>
<style>
  /* ------- local resets + app chrome ------- */
  * { box-sizing: border-box; }
  html, body, #root { height: 100%; margin: 0; }
  body { overflow: hidden; background: var(--bg-canvas); color: var(--fg-2); }

  /* density knobs — overridden by tweaks */
  :root {
    --dens-row-y: 14px;
    --dens-row-x: 20px;
    --dens-card-pad: 24px;
    --dens-section-gap: 28px;
    --dens-read-col: 720px;
    --dens-line: 1.6;
  }
  [data-density="airy"] {
    --dens-row-y: 20px;
    --dens-card-pad: 32px;
    --dens-section-gap: 40px;
    --dens-read-col: 700px;
    --dens-line: 1.7;
  }
  [data-density="dense"] {
    --dens-row-y: 8px;
    --dens-row-x: 14px;
    --dens-card-pad: 16px;
    --dens-section-gap: 18px;
    --dens-read-col: 760px;
    --dens-line: 1.5;
  }

  /* Scrollbar nicety */
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-thumb { background: #DADADA; border-radius: 6px; border: 2px solid #F8F8F8; }
  ::-webkit-scrollbar-thumb:hover { background: #AFB3AF; }
  ::-webkit-scrollbar-track { background: transparent; }

  /* common utility for interactive rows */
  .row-hover:hover { background: var(--bg-hover); }

  /* Buttons */
  .btn {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 8px 14px; border-radius: 8px;
    font-family: var(--font-primary); font-size: 14px; font-weight: 500;
    border: 1px solid transparent; cursor: pointer; transition: background .12s, border-color .12s;
    line-height: 1;
  }
  .btn-primary { background: var(--path-primary); color: #fff; }
  .btn-primary:hover { background: #236A27; }
  .btn-ghost { background: transparent; border-color: var(--border-default); color: var(--fg-2); }
  .btn-ghost:hover { background: var(--bg-hover); }
  .btn-subtle { background: transparent; color: var(--fg-3); }
  .btn-subtle:hover { background: var(--bg-hover); color: var(--fg-2); }
  .btn-icon { padding: 8px; }

  /* Chips / pills */
  .chip {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 3px 9px; border-radius: 999px;
    font-family: var(--font-primary); font-size: 11px; font-weight: 500;
    line-height: 1.4; white-space: nowrap;
  }
  .chip-now     { background: #FEF3F2; color: #B42318; }
  .chip-next    { background: #FFF6E6; color: #B54708; }
  .chip-later   { background: #ECFDF3; color: #037847; }
  .chip-overdue { background: #FEE4E2; color: #912018; }
  .chip-due     { background: #1E1E1E; color: #fff; }
  .chip-new     { background: #FF5252; color: #fff; }
  .chip-done    { background: #F3F3F3; color: #747973; text-decoration: line-through; }
  .chip-neutral { background: #F3F3F3; color: #565955; }

  /* Tag — product category */
  .tag {
    display: inline-flex; align-items: center; gap: 6px;
    font-family: var(--font-secondary); font-size: 11px; font-weight: 500;
    color: var(--fg-2);
  }
  .tag-dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; }

  /* Mono meta */
  .meta {
    font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.02em;
    color: var(--fg-3); text-transform: uppercase;
  }

  /* Cards */
  .card {
    background: var(--bg-surface);
    border: 1px solid var(--border-subtle);
    border-radius: var(--radius-md);
  }

  /* Section header */
  .section-h {
    display: flex; align-items: baseline; justify-content: space-between;
    margin-bottom: 16px;
  }
  .section-h h2 {
    margin: 0; font-size: 18px; font-weight: 600; color: var(--fg-1);
    letter-spacing: -0.005em;
  }
  .section-h .meta { font-size: 10px; }

  /* Focus ring */
  button:focus-visible, a:focus-visible, input:focus-visible, textarea:focus-visible, [tabindex]:focus-visible {
    outline: none;
    box-shadow: var(--shadow-focus);
  }

  /* Text input */
  .input {
    height: 34px; padding: 0 10px;
    border: 1px solid var(--border-default); border-radius: 6px;
    font-family: var(--font-primary); font-size: 13px; color: var(--fg-2);
    background: #fff; outline: none;
  }
  .input:focus { border-color: var(--path-primary-light-1); }

  /* Tweaks panel */
  .tweaks-panel {
    position: fixed; right: 20px; bottom: 20px; width: 280px; z-index: 40;
    background: #fff; border: 1px solid var(--border-default);
    border-radius: 12px; box-shadow: var(--shadow-3);
    font-family: var(--font-primary);
    display: none;
    overflow: hidden;
  }
  .tweaks-panel.open { display: block; }
  .tweaks-head {
    padding: 14px 16px; border-bottom: 1px solid var(--border-subtle);
    display: flex; align-items: center; justify-content: space-between;
    font-weight: 600; font-size: 13px; color: var(--fg-1);
  }
  .tweaks-body { padding: 14px 16px; display: flex; flex-direction: column; gap: 14px; }
  .tweak-label { font-size: 11px; color: var(--fg-3); font-family: var(--font-mono); text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 6px; }
  .tweak-seg { display: flex; background: var(--bg-sunken); border-radius: 8px; padding: 3px; gap: 2px; }
  .tweak-seg button {
    flex: 1; background: transparent; border: 0; padding: 6px 8px; font-size: 12px;
    color: var(--fg-3); border-radius: 6px; cursor: pointer; font-family: inherit;
    transition: background .12s;
  }
  .tweak-seg button.on { background: #fff; color: var(--fg-1); box-shadow: 0 1px 2px rgba(0,0,0,0.05); font-weight: 500; }
  .tweak-seg button:not(.on):hover { color: var(--fg-2); }

  /* screen transition */
  .screen-enter { animation: fadeIn 180ms ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }
  @keyframes slideInRight { from { transform: translateX(40px); opacity: 0; } to { transform: none; opacity: 1; } }

  /* kbd */
  kbd {
    display: inline-block; padding: 1px 6px; border-radius: 4px;
    border: 1px solid var(--border-default); background: #fff;
    font-family: var(--font-mono); font-size: 10.5px; color: var(--fg-3);
    line-height: 1.5;
  }

  /* avatar */
  .avatar {
    width: 24px; height: 24px; border-radius: 50%;
    display: inline-flex; align-items: center; justify-content: center;
    font-family: var(--font-primary); font-size: 10px; font-weight: 600;
    color: #fff; flex-shrink: 0;
    letter-spacing: 0;
  }
  .av-dave { background: linear-gradient(135deg, #297D2D, #49BC4E); }
  .av-raj  { background: linear-gradient(135deg, #10298E, #0068A3); }
  .av-agent {
    background: #1E1E1E; color: #fff;
    font-family: var(--font-mono); font-size: 9px;
  }

  /* Divider */
  .hr { height: 1px; background: var(--border-subtle); border: 0; margin: 0; }

  /* link-style */
  .link { color: var(--path-accent-blue); text-decoration: none; }
  .link:hover { text-decoration: underline; }

  /* IA map (dashboard IA doc) */
  .ia-map { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin: 10px 0 20px; }
  .ia-col { border: 1px solid var(--border-subtle); border-radius: 6px; background: var(--bg-sunken); padding: 10px 12px; }
  .ia-col-h { font-size: 11px; font-weight: 600; color: var(--fg-1); text-transform: uppercase; letter-spacing: .04em; margin-bottom: 6px; }
  .ia-col ul { list-style: none; padding: 0; margin: 0; }
  .ia-col li { font-size: 12.5px; color: var(--fg-2); padding: 3px 0; border-bottom: 1px dashed var(--border-subtle); display: flex; align-items: center; gap: 6px; }
  .ia-col li:last-child { border-bottom: 0; }
  .ia-tag { font-size: 9px; padding: 1px 6px; border-radius: 3px; background: var(--path-primary); color: var(--fg-on-primary); letter-spacing: .04em; text-transform: uppercase; font-weight: 600; }
  .ia-table { width: 100%; border-collapse: collapse; margin: 8px 0 18px; font-size: 13px; }
  .ia-table th, .ia-table td { text-align: left; padding: 8px 10px; border-bottom: 1px solid var(--border-subtle); }
  .ia-table th { color: var(--fg-3); font-weight: 500; font-size: 11px; text-transform: uppercase; letter-spacing: .04em; background: var(--bg-sunken); }
  .ia-table td { color: var(--fg-2); }

  /* Prose (for docs reader) */
  .prose { font-family: var(--font-primary); color: var(--fg-2); line-height: var(--dens-line); font-size: 15.5px; max-width: var(--dens-read-col); }
  .prose h1 { font-size: 32px; margin: 0 0 6px; letter-spacing: -0.01em; color: var(--fg-1); font-weight: 600; }
  .prose h2 { font-size: 20px; margin: 32px 0 10px; color: var(--fg-1); font-weight: 600; }
  .prose h3 { font-size: 16px; margin: 22px 0 6px; color: var(--fg-1); font-weight: 600; }
  .prose p  { margin: 0 0 14px; }
  .prose ul { padding-left: 18px; margin: 0 0 14px; }
  .prose li { margin: 4px 0; }
  .prose blockquote { margin: 14px 0; padding: 8px 14px; border-left: 2px solid var(--path-primary-light-2); color: var(--fg-2); background: #FAFBFA; }
  .prose code { font-family: var(--font-mono); font-size: 13px; background: var(--bg-sunken); padding: 1px 6px; border-radius: 4px; color: var(--fg-1); }
  .prose .embed {
    margin: 18px 0; border: 1px solid var(--border-subtle); border-radius: 8px;
    display: flex; align-items: center; gap: 12px; padding: 14px;
    background: #FCFCFC;
  }

  /* ========== Mobile (≤768px) ========== */
  .mobile-only { display: none; }
  @media (max-width: 768px) {
    .desktop-only { display: none !important; }
    .mobile-only { display: block; }
    body { font-size: 15px; overflow: auto; }

    /* App shell */
    .app-shell { flex-direction: column !important; height: 100dvh !important; }
    .app-shell main {
      padding: 12px 16px 96px !important;
    }

    /* Mobile topbar */
    .m-topbar {
      position: sticky; top: 0; z-index: 50;
      height: 52px; background: var(--bg-surface);
      border-bottom: 1px solid var(--border-subtle);
      display: flex; align-items: center; padding: 0 12px; gap: 8px;
      flex-shrink: 0;
    }
    .m-topbar .m-title {
      flex: 1; min-width: 0; font-family: var(--font-secondary);
      font-size: 16px; font-weight: 600; color: var(--fg-1);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .m-iconbtn {
      width: 40px; height: 40px; border-radius: 10px;
      display: inline-flex; align-items: center; justify-content: center;
      background: transparent; border: 0; cursor: pointer; color: var(--fg-1);
      position: relative;
    }
    .m-iconbtn:active { background: var(--bg-sunken); }
    .m-iconbtn .m-dot {
      position: absolute; top: 8px; right: 8px;
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--path-primary); border: 2px solid var(--bg-surface);
    }

    /* Bottom tab bar */
    .m-tabbar {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 60;
      height: 72px; padding-bottom: env(safe-area-inset-bottom, 0);
      background: var(--bg-surface);
      border-top: 1px solid var(--border-subtle);
      display: flex; align-items: stretch;
      box-shadow: 0 -1px 8px rgba(15,23,26,0.04);
    }
    .m-tab {
      flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 3px; padding: 8px 4px; border: 0; background: transparent; cursor: pointer;
      font-family: var(--font-primary); font-size: 10.5px; letter-spacing: .02em;
      color: var(--fg-3); min-height: 44px;
    }
    .m-tab.on { color: var(--path-primary); }
    .m-tab.on .m-tab-ico { color: var(--path-primary); }
    .m-tab-ico { display: flex; align-items: center; justify-content: center; }

    /* Bottom sheet / drawer */
    .m-sheet-overlay {
      position: fixed; inset: 0; z-index: 80;
      background: rgba(15,23,26,0.4);
      opacity: 0; pointer-events: none;
      transition: opacity 180ms;
    }
    .m-sheet-overlay.open { opacity: 1; pointer-events: auto; }
    .m-sheet {
      position: fixed; left: 0; right: 0; bottom: 0; z-index: 90;
      background: var(--bg-surface);
      border-radius: 18px 18px 0 0;
      max-height: 85vh; overflow-y: auto;
      transform: translateY(100%);
      transition: transform 220ms cubic-bezier(.2,.8,.2,1);
      box-shadow: 0 -8px 30px rgba(15,23,26,0.15);
      padding-bottom: env(safe-area-inset-bottom, 0);
    }
    .m-sheet.open { transform: translateY(0); }
    .m-sheet-handle {
      width: 40px; height: 4px; border-radius: 2px;
      background: var(--border-default);
      margin: 10px auto 4px;
    }
    .m-sheet-head {
      padding: 8px 20px 16px; display: flex; align-items: center; justify-content: space-between;
      font-family: var(--font-secondary); font-weight: 600; font-size: 16px; color: var(--fg-1);
    }

    /* Full-screen drawer from right (menu) */
    .m-drawer {
      position: fixed; top: 0; right: 0; bottom: 0; z-index: 90;
      width: min(86vw, 360px); background: var(--bg-surface);
      transform: translateX(100%);
      transition: transform 220ms cubic-bezier(.2,.8,.2,1);
      box-shadow: -8px 0 30px rgba(15,23,26,0.18);
      display: flex; flex-direction: column;
    }
    .m-drawer.open { transform: translateX(0); }

    /* Larger buttons */
    .btn { min-height: 36px; padding: 8px 14px; font-size: 13px; }
    .btn.btn-icon { min-height: 40px; min-width: 40px; }

    /* Week strip */
    .m-daystrip {
      display: flex; gap: 6px; overflow-x: auto; padding: 4px 2px 10px;
      scrollbar-width: none;
    }
    .m-daystrip::-webkit-scrollbar { display: none; }
    .m-daypill {
      flex: 0 0 auto; min-width: 58px; padding: 10px 10px;
      border-radius: 12px; border: 1px solid var(--border-subtle);
      background: var(--bg-surface); cursor: pointer;
      display: flex; flex-direction: column; align-items: center; gap: 4px;
      transition: all 120ms;
    }
    .m-daypill.on {
      background: var(--path-primary); border-color: var(--path-primary);
      color: var(--fg-on-primary);
    }
    .m-daypill .m-daypill-dow {
      font-size: 10px; font-family: var(--font-mono); letter-spacing: .06em;
      text-transform: uppercase; opacity: .7;
    }
    .m-daypill .m-daypill-num {
      font-size: 18px; font-weight: 600; font-family: var(--font-secondary);
    }
    .m-daypill .m-daypill-cnt {
      font-size: 9.5px; font-family: var(--font-mono); opacity: .6;
    }
    .m-daypill.on .m-daypill-dow,
    .m-daypill.on .m-daypill-cnt { opacity: .85; }

    /* Section headers (mobile) */
    .m-section-h {
      font-family: var(--font-mono); font-size: 11px; letter-spacing: .08em;
      text-transform: uppercase; color: var(--fg-3); margin: 18px 4px 8px;
      display: flex; align-items: center; gap: 8px;
    }

    /* Doc list row (mobile) */
    .m-doc-row {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 14px; border: 1px solid var(--border-subtle);
      border-radius: 10px; background: var(--bg-surface);
      min-height: 64px; cursor: pointer; margin-bottom: 8px;
    }
    .m-doc-row:active { background: var(--bg-sunken); }
    .m-doc-row .m-doc-ico {
      width: 40px; height: 40px; border-radius: 8px;
      background: var(--bg-sunken); display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }

    /* Mobile card (backlog, etc.) */
    .m-card {
      padding: 14px; border: 1px solid var(--border-subtle);
      border-radius: 12px; background: var(--bg-surface);
      margin-bottom: 10px;
    }

    /* Fix chip overflows */
    .dock, .stack-hov { flex-wrap: wrap; }

    /* Hide desktop-only grids */
    .ia-map { grid-template-columns: 1fr !important; }
    .prose { padding: 0 !important; }

    /* Force-stack wide desktop grids that use inline-style display:grid */
    main > div > div.screen-enter > div[style*="grid-template-columns"] {
      grid-template-columns: 1fr !important;
      gap: 14px !important;
    }
    main > div > div.screen-enter > div > div[style*="grid-template-columns"] {
      grid-template-columns: 1fr !important;
    }
    /* Targeted: headline tiles 4-up */
    main [style*="repeat(4, 1fr)"] { grid-template-columns: 1fr 1fr !important; }
    /* 2-col layouts */
    main [style*="1.5fr 1fr"],
    main [style*="2fr 1fr"],
    main [style*="1fr 280px"],
    main [style*="1fr 1fr"] { grid-template-columns: 1fr !important; }
    /* 3-col product kanban */
    main [style*="repeat(3, 1fr)"] { grid-template-columns: 1fr !important; }
    /* Doc list column grid */
    main [style*="24px 1fr 140px 120px 110px 32px"] {
      grid-template-columns: 20px 1fr auto !important;
    }
    main [style*="24px 1fr 140px 120px 110px 32px"] > :nth-child(n+4) { display: none !important; }
    /* Meta grid in side drawers */
    main [style*="120px 1fr"] { grid-template-columns: 1fr !important; }

    /* Calendar week grid — too wide, turn to horizontal-scroll */
    main [style*="60px repeat(5, 1fr)"] {
      min-width: 640px;
    }
    /* Wrap calendar in scroll container — can't inject wrapper, so scroll parent */
    .cal-wrap { overflow-x: auto; }

    /* Backlog kanban columns stack */
    main [style*="200px repeat(3, minmax(260px, 1fr))"] {
      grid-template-columns: 1fr !important;
    }

    /* Doc reader full-bleed */
    .m-reader-body {
      padding: 24px 18px !important;
      border-radius: 0 !important;
      border-left: 0 !important; border-right: 0 !important;
      margin: 0 -16px !important;
    }

    /* Prose tweaks on mobile */
    .prose h1 { font-size: 26px !important; line-height: 1.22 !important; }
    .prose h2 { font-size: 18px !important; }
    .prose p, .prose li { font-size: 15px !important; line-height: 1.55 !important; }
    .prose pre, .prose .ia-table { overflow-x: auto; }

    /* Tweaks panel becomes bottom sheet */
    .tweaks-panel {
      position: fixed !important;
      top: auto !important; right: 0 !important; left: 0 !important; bottom: 0 !important;
      width: 100% !important;
      max-height: 80vh !important;
      border-radius: 18px 18px 0 0 !important;
      transform: translateY(100%) !important;
      transition: transform 220ms cubic-bezier(.2,.8,.2,1) !important;
    }
    .tweaks-panel.open { transform: translateY(0) !important; }

    /* Menu list */
    .m-menu-item {
      display: flex; align-items: center; gap: 14px;
      padding: 14px 20px; min-height: 52px;
      border-bottom: 1px solid var(--border-subtle);
      cursor: pointer;
      font-family: var(--font-secondary); font-size: 15px; color: var(--fg-1);
    }
    .m-menu-item:active { background: var(--bg-sunken); }
    .m-menu-item.on { color: var(--path-primary); }
    .m-menu-item .m-menu-label { flex: 1; }
    .m-menu-item .m-menu-badge {
      font-family: var(--font-mono); font-size: 11px; color: var(--fg-4);
    }
    .m-menu-sec {
      padding: 18px 20px 6px; font-family: var(--font-mono); font-size: 10.5px;
      letter-spacing: .08em; text-transform: uppercase; color: var(--fg-4);
    }

    /* === PageHeader fixes for mobile ===
       Stack title/sub above the actions on phones so actions can't
       squeeze the title block down to one-word-per-line. */
    .page-header-row {
      flex-direction: column !important;
      align-items: stretch !important;
      gap: 12px !important;
    }
    .page-header-title { width: 100% !important; min-width: 0 !important; }
    .page-header-title h1 { font-size: 22px !important; }
    .page-header-actions {
      flex-wrap: wrap !important;
      gap: 8px !important;
    }
    .page-header-actions .btn { flex: 1 1 auto; min-width: 0; }

    /* Tab rail: horizontal scroll, no mid-word wrap */
    .page-header-tabs {
      overflow-x: auto !important;
      scrollbar-width: none !important;
      flex-wrap: nowrap !important;
    }
    .page-header-tabs::-webkit-scrollbar { display: none; }
    .page-header-tabs > button {
      white-space: nowrap !important;
      flex-shrink: 0 !important;
    }

    /* Filter+action row: stack filter full-width; buttons on their own row */
    main [style*="display: flex"][style*="gap"] > input[placeholder="Filter"],
    main [style*="display: flex"][style*="gap"] > input[placeholder*="ilter"] {
      min-width: 0 !important;
    }

    /* Any explicit wide grid in page bodies -> collapse to 1col */
    main [style*="grid-template-columns: 2fr 1fr"],
    main [style*="grid-template-columns: 1fr 1fr"],
    main [style*="grid-template-columns: 1fr 280px"],
    main [style*="grid-template-columns: 1fr 300px"],
    main [style*="grid-template-columns: 1fr 320px"],
    main [style*="grid-template-columns: 280px 1fr"],
    main [style*="grid-template-columns: 300px 1fr"],
    main [style*="grid-template-columns: repeat(2"],
    main [style*="grid-template-columns: repeat(3"],
    main [style*="grid-template-columns: repeat(4"] {
      grid-template-columns: 1fr !important;
    }

    /* Fixed-height chat / log panes — use viewport minus mobile chrome */
    main [style*="calc(100vh - 230px)"],
    main [style*="calc(100vh - 220px)"],
    main [style*="calc(100vh - 210px)"] {
      height: auto !important;
      min-height: 60vh !important;
    }

    /* Inputs and buttons shouldn't overflow the viewport edge */
    main button, main input, main select { max-width: 100%; }
    main { overflow-x: hidden; }
  }

</style>

// override avatar stack spacing
const _avatarStackStyle = document.createElement("style");
_avatarStackStyle.textContent = `
  .avatar + .avatar { margin-left: -7px; border: 2px solid #fff; box-sizing: content-box; width: auto; }
`;
document.head.appendChild(_avatarStackStyle);

/* =============================================================
   TopBar — breadcrumbs, global actions
   ============================================================= */
const TopBar = ({ crumbs, onQuickAdd }) => {
  return (
    <header style={{
      height: 56, background: "var(--bg-surface)", borderBottom: "1px solid var(--border-subtle)",
      display: "flex", alignItems: "center", padding: "0 24px", gap: 16,
      flexShrink: 0,
    }}>
      <div style={{ display: "flex", alignItems: "center", gap: 6, flex: 1, minWidth: 0 }}>
        {crumbs.map((c, i) => (
          <React.Fragment key={i}>
            {i > 0 && <Icon name="chevron-right" size={14} color="var(--grey-300)" />}
            <span style={{
              fontFamily: "var(--font-secondary)",
              fontSize: 13,
              color: i === crumbs.length - 1 ? "var(--fg-1)" : "var(--fg-3)",
              fontWeight: i === crumbs.length - 1 ? 500 : 400,
            }}>{c}</span>
          </React.Fragment>
        ))}
      </div>

      <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
        <span className="meta" style={{ fontSize: 10, marginRight: 8 }}>MON 13 APR · 10:42 GMT</span>
        <button className="btn btn-ghost" onClick={onQuickAdd}>
          <Icon name="plus" size={14} /> New
        </button>
        <button className="btn btn-subtle btn-icon" title="Notifications">
          <Icon name="bell" size={16} />
        </button>
      </div>
    </header>
  );
};

const StageChip = ({ stage, flag }) => {
  if (flag === "overdue") return <span className="chip chip-overdue">Overdue</span>;
  if (flag === "due-soon") return <span className="chip chip-due">Due soon</span>;
  const map = { now: "chip-now", next: "chip-next", later: "chip-later" };
  const label = { now: "Now", next: "Next", later: "Later" }[stage];
  return <span className={`chip ${map[stage]}`}>{label}</span>;
};

const BacklogView = ({ productFilter = null, layout = "kanban", tab = "global", onTab }) => {
  const [selected, setSelected] = useState(null);
  const [query, setQuery] = useState("");

  const items = useMemo(() => {
    let rows = window.BACKLOG;
    if (productFilter) rows = rows.filter(i => i.product === productFilter);
    if (query) rows = rows.filter(i => (i.title + i.id + i.note).toLowerCase().includes(query.toLowerCase()));

  }, [productFilter, query]);

  const counts = {
    now: items.filter(i => i.stage === "now").length,

  return (
    <div className="screen-enter">
      <PageHeader
        title={productFilter ? window.PRODUCT_MAP[productFilter].label + " backlog" : "Backlog"}

          ? <>One product. Now <b style={{color:"var(--fg-2)"}}>{counts.now}</b>, Next {counts.next}, Later {counts.later}. Drag to reorder.</>
          : <>Product-led priorities across all products. Now <b style={{color:"var(--fg-2)"}}>{counts.now}</b>, Next {counts.next}, Later {counts.later}.</>
        }
        right={
          <>
            <div style={{ display: "flex", alignItems: "center", gap: 6, padding: "0 10px", height: 34, border: "1px solid var(--border-default)", borderRadius: 6, background: "var(--bg-surface)" }}>
              <Icon name="search" size={13} color="var(--grey-500)" />

                style={{ border: 0, outline: "none", fontFamily: "var(--font-primary)", fontSize: 13, width: 140, color: "var(--fg-2)", background: "transparent" }} />
            </div>
            <button className="btn btn-ghost"><Icon name="filter" size={14} /> Owner</button>
            <button className="btn btn-primary"><Icon name="plus" size={14} /> Add item</button>
          </>
        }
        tabs={!productFilter ? [
          { id: "global",  label: "All products", count: window.BACKLOG.length },
          { id: "mine",    label: "Mine",         count: window.BACKLOG.filter(i => i.owner === "D").length },
          { id: "raj",     label: "Raj's",        count: window.BACKLOG.filter(i => i.owner === "R").length },
          { id: "flagged", label: "Flagged",      count: window.BACKLOG.filter(i => i.flag).length },
        ] : null}

      {layout === "list"   && <BacklogList items={items} onItemClick={setSelected} />}

      <ItemDrawer item={selected} onClose={() => setSelected(null)} />
    </div>
  );
};

// Docs view — list + reader

// ----- File helpers -----
const FILE_TYPE = {
  xlsx: { label: "XLSX", bg: "#E7F5EA", fg: "#1E7D32", sub: "Excel"      },
  docx: { label: "DOCX", bg: "#E5EDFB", fg: "#1E51B8", sub: "Word"       },
  pptx: { label: "PPTX", bg: "#FBE9E2", fg: "#B14318", sub: "PowerPoint" },
  pdf:  { label: "PDF",  bg: "#FBE4E4", fg: "#B02626", sub: "PDF"        },
  fig:  { label: "FIG",  bg: "#F0EAFB", fg: "#5A2EB8", sub: "Figma"      },
  png:  { label: "PNG",  bg: "#F1F3F5", fg: "#46555E", sub: "Image"      },
  jpg:  { label: "JPG",  bg: "#F1F3F5", fg: "#46555E", sub: "Image"      },
  csv:  { label: "CSV",  bg: "#E7F5EA", fg: "#1E7D32", sub: "Data"       },
};
const fileMeta = (ext) => FILE_TYPE[ext] || { label: (ext||"FILE").toUpperCase(), bg: "#F1F3F5", fg: "#46555E", sub: "File" };
const humanBytes = (b) => {
  if (b == null) return "";
  if (b < 1024) return b + " B";
  if (b < 1024*1024) return (b/1024).toFixed(0) + " KB";
  return (b/1024/1024).toFixed(1) + " MB";
};

const FileBadge = ({ ext, size = 36 }) => {
  const m = fileMeta(ext);
  return (
    <div style={{
      width: size, height: size * 0.78, borderRadius: 4,
      background: m.bg, color: m.fg,
      display: "flex", alignItems: "center", justifyContent: "center",
      fontFamily: "var(--font-mono)", fontWeight: 600,
      fontSize: size * 0.28, letterSpacing: 0.3,
      flexShrink: 0,
    }}>
      {m.label}
    </div>
  );
};

const FileCard = ({ f, product, onClick }) => {
  const p = product ? window.PRODUCT_MAP[product] : null;
  return (
    <div className="row-hover" onClick={onClick} style={{
      padding: "12px 14px", border: "1px solid var(--border-subtle)",
      borderRadius: 8, background: "var(--bg-surface)", cursor: "pointer",
      display: "flex", alignItems: "center", gap: 12,
    }}>
      <FileBadge ext={f.ext} size={38} />
      <div style={{ flex: 1, minWidth: 0 }}>
        <div style={{ fontSize: 13.5, color: "var(--fg-1)", fontWeight: 500, lineHeight: 1.35, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{f.title}</div>
        <div style={{ display: "flex", alignItems: "center", gap: 10, marginTop: 5, flexWrap: "wrap" }}>
          {p && <span className="tag" style={{ color: p.color }}><span className="tag-dot" style={{ background: p.color }} />{p.label}</span>}
          {f.group && <span className="tag" style={{ color: "var(--fg-3)" }}>{f.group}</span>}
          <span className="meta" style={{ fontSize: 10 }}>{f.version} · {humanBytes(f.bytes)} · {f.updated}</span>
        </div>
      </div>
      <Avatar who={f.by} size={22} />
    </div>
  );
};

// Slim side-panel preview for uploaded files — not the long-form page reader
const FilePreview = ({ f, onClose }) => {
  const m = fileMeta(f.ext);

const DocsView = ({ mode = "product" }) => {
  const [reading, setReading] = useState(null);     // page reader
  const [previewing, setPreviewing] = useState(null); // file side-panel
  const [query, setQuery] = useState("");
  // per-group view (tab). Key: product id or finance group name. Value: "pages" | "files" | "all"
  const [tabs, setTabs] = useState({});
  const [layout, setLayout] = useState("grid"); // "grid" | "list"
  const getTab = (key) => tabs[key] || "all";
  const setTab = (key, v) => setTabs(t => ({ ...t, [key]: v }));

  const closeReader  = () => setReading(null);
  const closePreview = () => setPreviewing(null);

  // If reading a doc, take over the view entirely
  if (reading) return <DocReader doc={reading} onClose={closeReader} />;

  // Unified search: matches title, tags, ext, group/product label
  const q = query.trim().toLowerCase();
  const match = (item, p) => {
    if (!q) return true;
    const hay = [
      item.title, (item.tags||[]).join(" "), item.ext || "",
      item.group || "", (p ? p.label : ""),
    ].join(" ").toLowerCase();
    return hay.includes(q);
  };

  const headerRight = (
    <>
      <div style={{
        display: "flex", alignItems: "center", gap: 6, padding: "0 10px",
        height: 34, border: "1px solid var(--border-default)", borderRadius: 6,
        background: "var(--bg-surface)", minWidth: 260,
      }}>
        <Icon name="search" size={13} color="var(--grey-500)" />
        <input
          value={query} onChange={e => setQuery(e.target.value)}
          placeholder={mode === "finance" ? "Search finance — title, tag, type…" : mode === "sales" ? "Search sales — title, tag, type…" : mode === "legal" ? "Search legal — title, tag, type…" : "Search all docs + files — title, tag, type…"}
          style={{ flex: 1, border: 0, outline: "none", fontFamily: "var(--font-primary)", fontSize: 13, background: "transparent" }}
        />
        {query && (
          <button onClick={() => setQuery("")} style={{ border: 0, background: "transparent", cursor: "pointer", color: "var(--fg-3)", padding: 2, display: "flex" }}>
            <Icon name="x" size={12} />
          </button>
        )}
      </div>
      <div style={{ display: "inline-flex", border: "1px solid var(--border-default)", borderRadius: 6, padding: 2, background: "var(--bg-surface)" }}>
        {["grid", "list"].map(v => (
          <button key={v} onClick={() => setLayout(v)} title={v === "grid" ? "Grid view" : "List view"} style={{
            border: 0, cursor: "pointer", padding: "4px 8px", borderRadius: 4,
            background: layout === v ? "var(--bg-sunken)" : "transparent",
            color: layout === v ? "var(--fg-1)" : "var(--fg-3)",
            display: "flex", alignItems: "center",
          }}>
            <Icon name={v === "grid" ? "grid" : "list"} size={14} />
          </button>
        ))}
      </div>
      <button className="btn btn-ghost"><Icon name="upload" size={14} /> Upload</button>
      <button className="btn btn-primary"><Icon name="plus" size={14} /> New</button>
    </>
  );

  // --- Business modes: finance / sales / legal ---
  const BUSINESS_CONFIG = {
    finance: {
      title: "Finance",
      sub: "Raj's parallel space. Pages, sheets, contracts, decks. Separate from product docs on purpose.",
      groups: ["Models", "Forecasts", "Legal", "Contracts", "Board"],
      docs: window.FINANCE_DOCS, files: window.FINANCE_FILES,
    },
    sales: {
      title: "Sales",
      sub: "Pipeline, accounts, playbooks, pricing. Everything customer-facing.",
      groups: ["Pipeline", "Accounts", "Playbooks", "Pricing"],
      docs: window.SALES_DOCS, files: window.SALES_FILES,
    },
    legal: {
      title: "Legal",
      sub: "Corporate, compliance, contracts, IP. Templates and executed versions in one place.",
      groups: ["Corporate", "Compliance", "Contracts", "IP"],
      docs: window.LEGAL_DOCS, files: window.LEGAL_FILES,
    },
  };

  if (BUSINESS_CONFIG[mode]) {
    const cfg = BUSINESS_CONFIG[mode];
    const totalDocs  = cfg.docs.filter(d => match(d)).length;
    const totalFiles = cfg.files.filter(f => match(f)).length;

    return (
      <div className="screen-enter">
        <PageHeader title={cfg.title} sub={<>{cfg.sub}</>} right={headerRight} />
        {q && <SearchSummary totalDocs={totalDocs} totalFiles={totalFiles} />}

        <div style={{ display: "flex", flexDirection: "column", gap: 28 }}>
          {cfg.groups.map(g => {
            const docs  = cfg.docs.filter(d => d.group === g && match(d));
            const files = cfg.files.filter(f => f.group === g && match(f));
            if (!docs.length && !files.length) return null;
            const tab = getTab(g);
            return (
              <GroupSection key={g} title={g} tab={tab} onTab={(v) => setTab(g, v)} docCount={docs.length} fileCount={files.length}>
                {layout === "list" ? (

                      </div>
                    )}
                  </>
                )}
              </GroupSection>
            );
          })}
        </div>

        {previewing && <FilePreview f={previewing} onClose={closePreview} />}
      </div>
    );
  }

  // --- Product mode ---
  const totalDocs  = window.PRODUCT_DOCS.filter(d => match(d, window.PRODUCT_MAP[d.product])).length;
  const totalFiles = window.PRODUCT_FILES.filter(f => match(f, window.PRODUCT_MAP[f.product])).length;

  return (
    <div className="screen-enter">
      <PageHeader
        title="Documentation"
        sub={<>One space per product. Pages, sheets, decks, PDFs — all searchable in one place.</>}
        right={headerRight}
      />

      {q && (
        <SearchSummary totalDocs={totalDocs} totalFiles={totalFiles} />
      )}

      <div style={{ display: "flex", flexDirection: "column", gap: 28 }}>

          const files = window.PRODUCT_FILES.filter(f => f.product === p.id && match(f, p));
          if (!docs.length && !files.length) return null;
          const tab = getTab(p.id);
          return (
            <GroupSection
              key={p.id}
              title={<><span style={{ width: 10, height: 10, borderRadius: 3, background: p.color, display: "inline-block", marginRight: 10, verticalAlign: "middle" }} />{p.label}</>}

                    <DocListRow key={f.id} item={f} kind="file" product={p.id} onClick={() => setPreviewing({...f, product: p.id})} />

                    <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(380px, 1fr))", gap: 10 }}>
                      {docs.map(d => <DocCard key={d.id} d={d} product={p.id} onClick={() => setReading(d)} />)}
                    </div>
                  )}
                  {(tab === "all" || tab === "files") && files.length > 0 && (
                    <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(340px, 1fr))", gap: 10, marginTop: docs.length && tab === "all" ? 12 : 0 }}>
                      {files.map(f => <FileCard key={f.id} f={{...f, product: p.id}} product={p.id} onClick={() => setPreviewing({...f, product: p.id})} />)}
                    </div>
                  )}
                </>
              )}
            </GroupSection>
          );
        })}
      </div>

      {previewing && <FilePreview f={previewing} onClose={closePreview} />}
    </div>
  );
};

// Calendar — two-founder overlay. Week view primary.

const HOURS = Array.from({ length: 11 }, (_, i) => i + 8); // 8–18
const DAYS = [
  { i: 0, label: "Mon", date: "13" },
  { i: 1, label: "Tue", date: "14" },
  { i: 2, label: "Wed", date: "15" },
  { i: 3, label: "Thu", date: "16" },
  { i: 4, label: "Fri", date: "17" },
];

const EVT_STYLE = {
  D:      { bg: "#ECFDF3", border: "#49BC4E", fg: "#1A4F1D" },
  R:      { bg: "#EEF2FF", border: "#3B82F6", fg: "#10298E" },
  SHARED: { bg: "#1E1E1E", border: "#1E1E1E", fg: "#fff" },
};

const CalendarView = () => {
  const [mode, setMode] = useState("week");
  const [showD, setShowD] = useState(true);
  const [showR, setShowR] = useState(true);

  const startY = 8;
  const hourH = 52;

  const events = window.EVENTS.filter(e =>
    (e.who === "SHARED") ||
    (e.who === "D" && showD) ||
    (e.who === "R" && showR)
  );

  return (
    <div className="screen-enter">
      <PageHeader
        title="Calendar"
        sub={<>Week of 13 April 2026. Two founders, one canvas. Synced via CalDAV (Fasthosts).</>}
        right={<>
          <div style={{ display: "flex", alignItems: "center", gap: 2, padding: 2, background: "var(--bg-sunken)", borderRadius: 8 }}>
            {["day", "week", "month"].map(m => (
              <button key={m} onClick={() => setMode(m)} className="btn" style={{
                padding: "6px 12px", border: 0,
                background: mode === m ? "var(--bg-surface)" : "transparent",
                color: mode === m ? "var(--fg-1)" : "var(--fg-3)",
                fontWeight: mode === m ? 500 : 400,
                boxShadow: mode === m ? "0 1px 2px rgba(0,0,0,0.05)" : "none",
              }}>{m[0].toUpperCase() + m.slice(1)}</button>
            ))}
          </div>
          <button className="btn btn-ghost"><Icon name="sync" size={14} /> Synced · 2 min ago</button>
          <button className="btn btn-primary"><Icon name="plus" size={14} /> New event</button>
        </>}
      />

      {/* legend */}
      <div style={{ display: "flex", alignItems: "center", gap: 18, marginBottom: 14 }}>
        <label style={{ display: "inline-flex", alignItems: "center", gap: 8, cursor: "pointer", fontSize: 13, color: "var(--fg-2)" }}>
          <input type="checkbox" checked={showD} onChange={e => setShowD(e.target.checked)} />
          <span style={{ width: 10, height: 10, borderRadius: 3, background: "#49BC4E" }} />
          Dave
        </label>
        <label style={{ display: "inline-flex", alignItems: "center", gap: 8, cursor: "pointer", fontSize: 13, color: "var(--fg-2)" }}>
          <input type="checkbox" checked={showR} onChange={e => setShowR(e.target.checked)} />
          <span style={{ width: 10, height: 10, borderRadius: 3, background: "#3B82F6" }} />
          Raj
        </label>
        <label style={{ display: "inline-flex", alignItems: "center", gap: 8, fontSize: 13, color: "var(--fg-2)" }}>
          <span style={{ width: 10, height: 10, borderRadius: 3, background: "#1E1E1E" }} />
          Shared
        </label>
        <div style={{ flex: 1 }} />
        <span style={{ fontSize: 12, color: "var(--danger-fg)", display: "inline-flex", alignItems: "center", gap: 6 }}>
          <Icon name="flag" size={13} color="var(--danger-fg)" />
          1 clash on Wed — Jeff has a proposal
        </span>
      </div>

      {mode === "week" && (
      <div style={{ background: "var(--bg-surface)", border: "1px solid var(--border-subtle)", borderRadius: 8, overflow: "hidden" }}>
        {/* day header row */}
        <div style={{ display: "grid", gridTemplateColumns: "60px repeat(5, 1fr)", borderBottom: "1px solid var(--border-subtle)", background: "var(--bg-sunken)" }}>
          <div />
          {DAYS.map(d => (
            <div key={d.i} style={{ padding: "12px 16px", borderLeft: "1px solid var(--border-subtle)", display: "flex", alignItems: "baseline", gap: 8 }}>
              <span className="meta" style={{ fontSize: 10 }}>{d.label}</span>
              <span style={{ fontSize: 18, fontWeight: 500, color: d.i === 2 ? "var(--path-primary)" : "var(--fg-1)" }}>{d.date}</span>
              {d.i === 0 && <span style={{ fontSize: 10, color: "var(--fg-4)", fontFamily: "var(--font-mono)" }}>APR</span>}
            </div>
          ))}
        </div>
        {/* grid */}
        <div style={{ position: "relative", display: "grid", gridTemplateColumns: "60px repeat(5, 1fr)" }}>
          {/* hour labels */}
          <div style={{ display: "flex", flexDirection: "column" }}>
            {HOURS.map(h => (
              <div key={h} style={{ height: hourH, padding: "4px 8px", borderTop: "1px solid var(--border-subtle)", textAlign: "right" }}>
                <span className="meta" style={{ fontSize: 9 }}>{String(h).padStart(2,"0")}:00</span>
              </div>
            ))}
          </div>
          {DAYS.map(d => (
            <div key={d.i} style={{ position: "relative", borderLeft: "1px solid var(--border-subtle)" }}>

                <div key={h} style={{ height: hourH, borderTop: "1px solid var(--border-subtle)" }} />
              ))}
              {/* events */}
              {events.filter(e => e.day === d.i).map((e, idx) => {
                const top = (e.start - startY) * hourH;
                const height = (e.end - e.start) * hourH - 4;
                const s = EVT_STYLE[e.who];
                const side = e.who === "R" ? { right: 4, left: "50%" } : e.who === "D" ? { left: 4, right: "50%" } : { left: 4, right: 4 };
                return (
                  <div key={idx} style={{
                    position: "absolute", top: top + 1, height, ...side,
                    background: s.bg, color: s.fg,
                    border: `1px solid ${s.border}`,
                    borderLeft: `3px solid ${s.border}`,
                    borderRadius: 5, padding: "5px 8px",
                    fontFamily: "var(--font-primary)", fontSize: 11.5, lineHeight: 1.3,
                    overflow: "hidden",
                    boxShadow: e.flag === "clash" ? "0 0 0 2px rgba(255,82,82,0.4)" : "none",
                  }}>
                    <div style={{ fontWeight: 500, color: s.fg }}>{e.title}</div>
                    <div style={{ fontFamily: "var(--font-mono)", fontSize: 9.5, opacity: 0.8 }}>
                      {String(Math.floor(e.start)).padStart(2,"0")}:{e.start % 1 ? "30" : "00"}–
                      {String(Math.floor(e.end)).padStart(2,"0")}:{e.end % 1 ? "30" : "00"}
                    </div>
                  </div>
                );
              })}
              {/* now line on Mon */}
              {d.i === 0 && (
                <div style={{ position: "absolute", left: 0, right: 0, top: (10.7 - startY) * hourH, borderTop: "2px solid var(--danger-fg)", zIndex: 2 }}>
                  <div style={{ position: "absolute", left: -4, top: -5, width: 8, height: 8, borderRadius: "50%", background: "var(--danger-fg)" }} />
                </div>
              )}
            </div>
          ))}
        </div>
      </div>
      )}

      {mode === "month" && (
        <div style={{ background: "var(--bg-surface)", border: "1px solid var(--border-subtle)", borderRadius: 8, padding: 28, textAlign: "center", color: "var(--fg-3)" }}>
          <div style={{ fontSize: 13 }}>Month view — collapsed density. (Coming next.)</div>
        </div>
      )}
      {mode === "day" && (
        <div style={{ background: "var(--bg-surface)", border: "1px solid var(--border-subtle)", borderRadius: 8, padding: 28, textAlign: "center", color: "var(--fg-3)" }}>
          <div style={{ fontSize: 13 }}>Day view — single column of events. (Coming next.)</div>
        </div>
      )}

      {/* Clash callout */}
      <div style={{ marginTop: 16, border: "1px solid var(--danger-bg)", background: "var(--danger-bg)", borderRadius: 8, padding: "14px 16px", display: "flex", alignItems: "flex-start", gap: 12 }}>
        <Avatar who="A" size={28} />
        <div style={{ flex: 1 }}>
          <div style={{ fontSize: 13, color: "var(--fg-1)", fontWeight: 500, marginBottom: 2 }}>Jeff · Clash on Wednesday</div>
          <div style={{ fontSize: 12.5, color: "var(--fg-2)", lineHeight: 1.5 }}>
            <b>Notable investor call</b> (shared) overlaps <b>Ops review</b> (Raj). Proposed move: Ops review → Wed 15:30. Both diaries free.
          </div>
        </div>
        <button className="btn btn-ghost">Decline</button>
        <button className="btn btn-primary">Accept move</button>
      </div>
    </div>
  );
};

window.CalendarView = CalendarView;

// Tasks — lightweight shared to-do

const TasksView = () => {
  const [tasks, setTasks] = useState(window.TASKS);
  const [filter, setFilter] = useState("all");

  const toggle = (id) => setTasks(tasks.map(t => t.id === id ? { ...t, done: !t.done } : t));
  const shown = tasks.filter(t => {
    if (filter === "mine") return t.owner === "D";
    if (filter === "raj")  return t.owner === "R";
    if (filter === "done") return t.done;
    if (filter === "open") return !t.done;
    return true;
  });

  const groups = ["today", "tomorrow", "Fri", "Mon", "15 Apr"];
  const byGroup = groups.map(g => ({ g, items: shown.filter(t => t.due === g) })).filter(x => x.items.length);

  return (
    <div className="screen-enter">
      <PageHeader
        title="Tasks"
        sub={<>Shared to-do. Tag each other. Link to backlog items or docs where it helps.</>}
        right={<>
          <button className="btn btn-ghost"><Icon name="filter" size={14} /> Owner</button>
          <button className="btn btn-primary"><Icon name="plus" size={14} /> New task</button>
        </>}
        tabs={[
          { id: "all",  label: "All",   count: tasks.length },
          { id: "open", label: "Open",  count: tasks.filter(t => !t.done).length },
          { id: "mine", label: "Mine",  count: tasks.filter(t => t.owner === "D").length },
          { id: "raj",  label: "Raj's", count: tasks.filter(t => t.owner === "R").length },
          { id: "done", label: "Done",  count: tasks.filter(t => t.done).length },
        ]}
        activeTab={filter}
        onTab={setFilter}
      />

      <div style={{ display: "flex", flexDirection: "column", gap: 20 }}>
        {byGroup.map(({ g, items }) => (
          <div key={g}>
            <div className="section-h" style={{ marginBottom: 8 }}>
              <h2 style={{ fontSize: 15, textTransform: "capitalize" }}>{g}</h2>

                  display: "flex", alignItems: "center", gap: 12,
                  padding: "12px 16px",
                  borderBottom: i < items.length - 1 ? "1px solid var(--border-subtle)" : "none",
                }}>
                  <button onClick={() => toggle(t.id)} style={{
                    width: 18, height: 18, border: "1.5px solid " + (t.done ? "var(--path-primary)" : "var(--border-strong)"),
                    background: t.done ? "var(--path-primary)" : "#fff",
                    borderRadius: 4, padding: 0, cursor: "pointer",

                  }}>

                  </button>
                  <div style={{ flex: 1, minWidth: 0 }}>

                      {t.title}
                    </div>
                    {t.link && (
                      <div style={{ display: "flex", alignItems: "center", gap: 6, marginTop: 3 }}>
                        <Icon name="link" size={11} color="var(--grey-400)" />

              ))}

          <Icon name="plus" size={14} color="var(--grey-400)" />

        </div>

    </div>
  );
};

/* ============================================================
   Mobile layer — shell, tab bar, menu, week view
   Activated via useIsMobile() at ≤768px.
   Desktop behaviour is completely untouched.
   ============================================================ */

function useIsMobile(breakpoint = 768) {
  const [is, setIs] = useState(() =>
    typeof window !== "undefined" && window.matchMedia(`(max-width:${breakpoint}px)`).matches
  );
  useEffect(() => {
    const mq = window.matchMedia(`(max-width:${breakpoint}px)`);
    const fn = () => setIs(mq.matches);
    mq.addEventListener("change", fn);
    return () => mq.removeEventListener("change", fn);
  }, [breakpoint]);
  return is;
}

  useEffect(() => {
    document.documentElement.setAttribute("data-density", tweaks.density);
    document.documentElement.setAttribute("data-theme", tweaks.theme || "light");
    window.__TWEAKS = tweaks;
  }, [tweaks]);

  useEffect(() => {
    localStorage.setItem("path:route", route);
  }, [route]);

  // Host edit-mode wiring
  useEffect(() => {
    const handle = (e) => {
      if (e.data?.type === "__activate_edit_mode") setTweaksOpen(true);
      if (e.data?.type === "__deactivate_edit_mode") setTweaksOpen(false);
    };
    window.addEventListener("message", handle);
    window.parent.postMessage({ type: "__edit_mode_available" }, "*");
    return () => window.removeEventListener("message", handle);
  }, []);

  const updateTweak = (k, v) => {
    const next = { ...tweaks, [k]: v };
    setTweaks(next);
    window.parent.postMessage({ type: "__edit_mode_set_keys", edits: { [k]: v } }, "*");
  };

  const navigate = (r) => setRoute(r);

  // Mobile state
  const isMobile = useIsMobile();
  const [menuOpen, setMenuOpen] = useState(false);
  const [searchOpen, setSearchOpen] = useState(false);

  // Crumbs
  const crumbs = (() => {
    if (route === "week")     return ["Workspace", "This Week"];
    if (route === "backlog")  return ["Workspace", "Backlog"];
    if (route === "docs")     return ["Workspace", "Documentation"];
    if (route === "tasks")    return ["Workspace", "Tasks"];
    if (route === "calendar") return ["Workspace", "Calendar"];
    if (route === "agent")    return ["Workspace", "Jeff"];
    if (route === "finance-docs") return ["Business", "Finance"];
    if (route === "sales-docs")   return ["Business", "Sales"];
    if (route === "legal-docs")   return ["Business", "Legal"];
    if (route.startsWith("product:")) return ["Products", window.PRODUCT_MAP[route.split(":")[1]].label];
    return [route];
  })();

  // View switch — mobile gets a bespoke Week view, other views adapt via CSS
  let view;
  if (route === "week")     view = isMobile ? <MobileWeekView onNavigate={navigate} /> : <WeekView onNavigate={navigate} />;
  else if (route === "backlog")  view = <BacklogView layout={tweaks.backlogLayout} tab={backlogTab} onTab={setBacklogTab} />;
  else if (route === "docs")     view = <DocsView mode="product" />;
  else if (route === "tasks")    view = <TasksView />;
  else if (route === "calendar") view = <CalendarView />;
  else if (route === "agent")    view = <LedgerView />;
  else if (route === "finance-docs") view = <DocsView mode="finance" />;
  else if (route === "sales-docs")   view = <DocsView mode="sales" />;
  else if (route === "legal-docs")   view = <DocsView mode="legal" />;
  else if (route.startsWith("product:")) view = <ProductPage productId={route.split(":")[1]} onNavigate={navigate} />;
  else view = <div>Not found</div>;

  // Close menu on route change
  useEffect(() => { setMenuOpen(false); setSearchOpen(false); }, [route]);

  if (isMobile) {
    const mobileTitle = crumbs[crumbs.length - 1];
    return (
      <div className="app-shell" style={{ display: "flex", flexDirection: "column", height: "100dvh", background: "var(--bg-canvas)" }}>
        <MobileTopbar
          title={mobileTitle}
          onSearch={() => setSearchOpen(true)}
          onMenu={() => setMenuOpen(true)}
          hasUpdates
        />
        <main style={{ flex: 1, overflowY: "auto", overflowX: "hidden", padding: "16px 16px 110px" }}>
          {view}
        </main>
        <BottomTabs active={route} onNavigate={navigate} onMenu={() => setMenuOpen(true)} />
        <MobileMenu open={menuOpen} onClose={() => setMenuOpen(false)} active={route} onNavigate={navigate} />
        <SearchSheet open={searchOpen} onClose={() => setSearchOpen(false)} onNavigate={navigate} />
        <TweaksPanel open={tweaksOpen} values={tweaks} onChange={updateTweak} onClose={() => setTweaksOpen(false)} />
      </div>
    );
  }

  return (
    <div className="app-shell" style={{ display: "flex", height: "100vh", background: "var(--bg-canvas)" }}>
      <Sidebar active={route} onNavigate={navigate} />
      <div style={{ flex: 1, display: "flex", flexDirection: "column", minWidth: 0, overflow: "hidden" }}>
        <TopBar crumbs={crumbs} onQuickAdd={() => {}} />
        <main style={{
          flex: 1, overflowY: "auto", overflowX: "hidden",
          padding: "32px 40px 80px",
          maxWidth: "100%",
        }}>
          <div style={{ maxWidth: 1320, margin: "0 auto" }}>
            {view}
          </div>
        </main>
      </div>
      <TweaksPanel open={tweaksOpen} values={tweaks} onChange={updateTweak} onClose={() => setTweaksOpen(false)} />
    </div>
  );
};

ReactDOM.createRoot(document.getElementById("root")).render(<App />);


</script>

</body>
</html>
