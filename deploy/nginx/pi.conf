# Pi (LAN test) nginx config for PathNotion.
# Copy to /etc/nginx/sites-available/path-pathnotion, symlink into sites-enabled,
# reload nginx. No TLS — Pi is accessed over the LAN by hostname or IP.

server {
    listen 80;
    server_name pathnotion.lan pathnotion 192.168.1.101;

    client_max_body_size 20m;  # allows bigger uploads (deck / PDF / logo)

    location / {
        proxy_pass http://127.0.0.1:4100;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
