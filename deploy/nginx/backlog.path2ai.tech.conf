# EC2 prod nginx config for PathNotion, re-using the backlog.path2ai.tech DNS name.
# Place at /etc/nginx/conf.d/path-pathnotion.conf, reload nginx, then run:
#   sudo certbot --nginx -d backlog.path2ai.tech
# Certbot will upgrade this block to listen on 443 with the Let's Encrypt cert.
#
# Before installing this file, disable the old backlog nginx block that was also
# serving backlog.path2ai.tech — there can only be one server block per server_name.

server {
    listen 80;
    listen [::]:80;
    server_name backlog.path2ai.tech;

    client_max_body_size 20m;  # allows bigger uploads (deck / PDF / logo)

    location /.well-known/acme-challenge/ {
        root /usr/share/nginx/html;
    }

    # Long-running Jeff jobs (competitor watch, daily news, research refresh) can take
    # several minutes to compile a multi-competitor structured report. Bump the upstream
    # read timeout so nginx doesn't 504 mid-run.
    location /api/agent/ {
        proxy_pass http://127.0.0.1:4100;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout    600s;
        proxy_send_timeout    600s;
        proxy_connect_timeout  60s;
    }

    location / {
        proxy_pass http://127.0.0.1:4100;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
